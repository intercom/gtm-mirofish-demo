services:
  backend:
    build:
      context: ./backend
    container_name: gtm-mirofish-backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - sim_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://backend:5001/api
    container_name: gtm-mirofish-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    profiles: [production]
    image: nginx:alpine
    container_name: gtm-mirofish-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  sim_data:

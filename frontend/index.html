<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/pwa-icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiroFish GTM Demo — Intercom</title>
    <meta name="description" content="Swarm intelligence engine for GTM operations simulation. Pre-test outbound campaigns, validate sales signals, and predict pricing outcomes with AI agent populations." />
    <meta property="og:title" content="MiroFish GTM Demo — Intercom" />
    <meta property="og:description" content="Swarm intelligence for GTM operations. Simulate campaigns with AI agent populations before going live." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#050505" />
    <script>
      // Prevent flash of wrong theme before Vue mounts
      ;(function () {
        var pref = localStorage.getItem('mirofish-theme')
        var dark = false
        if (pref === 'dark') dark = true
        else if (pref === 'light') dark = false
        else if (pref === 'system') dark = window.matchMedia('(prefers-color-scheme: dark)').matches
        else dark = location.pathname === '/' || location.pathname === '/login'
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

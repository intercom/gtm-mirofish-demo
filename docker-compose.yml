services:
  backend:
    build:
      context: ./backend
    container_name: gtm-mirofish-backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    stop_grace_period: 15s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - sim_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://backend:5001/api
    container_name: gtm-mirofish-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    stop_grace_period: 5s
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sim_data:

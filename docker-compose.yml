services:
  backend:
    build:
      context: ./backend
    container_name: gtm-mirofish-backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    restart: unless-stopped
    volumes:
      - sim_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://backend:5001
    container_name: gtm-mirofish-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sim_data:

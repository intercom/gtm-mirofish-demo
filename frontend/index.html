    <script>
      // Prevent flash of wrong theme before Vue mounts
      ;(function () {
        var pref = localStorage.getItem('mirofish-theme')
        var dark = false
        if (pref === 'dark') dark = true
        else if (pref === 'light') dark = false
        else if (pref === 'system') dark = window.matchMedia('(prefers-color-scheme: dark)').matches
        else dark = location.pathname === '/' || location.pathname === '/login'
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
